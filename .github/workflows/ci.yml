name: GiftTalk CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: gift-talk-backend/package-lock.json
    - name: Install dependencies
      run: cd gift-talk-backend && npm install
    - name: Run tests
      run: cd gift-talk-backend && npm test
      env:
        JWT_SECRET: test-secret
        NODE_ENV: test

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: gifttalk-frontend/package-lock.json
    - name: Install dependencies
      run: cd gifttalk-frontend && npm install
    - name: Run lint
      run: cd gifttalk-frontend && npm run lint

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
    - uses: actions/checkout@v3
    - name: Build Docker image
      run: cd gift-talk-backend && docker build -t gifttalk-backend .
